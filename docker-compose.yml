version: '3.8'

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: homework_mysql
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: homework_ocr
      MYSQL_CHARSET: utf8mb4
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/src/main/resources/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p123456"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存
  redis:
    image: redis:7.0-alpine
    container_name: homework_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # OCR Python 微服务
  ocr-service:
    build:
      context: ./ocr-service
      dockerfile: Dockerfile
    container_name: homework_ocr
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      DEBUG: "false"
    restart: unless-stopped

  # Spring Boot 后端（可选，也可直接 mvn spring-boot:run）
  # backend:
  #   build:
  #     context: ./backend
  #     dockerfile: Dockerfile
  #   container_name: homework_backend
  #   ports:
  #     - "8080:8080"
  #   depends_on:
  #     mysql:
  #       condition: service_healthy
  #     redis:
  #       condition: service_started
  #     ocr-service:
  #       condition: service_started
  #   environment:
  #     SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/homework_ocr?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
  #     SPRING_DATA_REDIS_HOST: redis

volumes:
  mysql_data:
  redis_data:
