server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: homework-ocr-backend

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/homework_ocr?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowMultiQueries=true
    username: root
    password: 1234

  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 10000ms

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.homework.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: homework-ocr-system-secret-key-2024-very-long-and-secure
  expiration: 86400000   # 24小时（毫秒）
  refresh-expiration: 604800000  # 7天（毫秒）

# OCR微服务地址
ocr:
  service:
    url: http://localhost:5000
    timeout: 30000

# 文件存储
file:
  upload:
    path: ./uploads
    max-size: 10485760  # 10MB

# 日志
logging:
  level:
    com.homework: debug
    org.springframework.security: info
